# Clash Verge 完整配置文件 (mihomo 内核专用)
# 生成时间: 2026-04-21

mixed-port: 7890
allow-lan: true
stack: system
log-level: info
ipv6: false

# 必须启用 dns 模块以支持高级分流
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8

proxies:
  - name: "US-Reality-8443-us-vip"
    type: vless
    server: 103.255.209.201
    port: 8443
    uuid: 72b30bc1-1470-4e6b-8715-e5522b22d01c
    udp: true
    tls: true
    flow: xtls-rprx-vision
    servername: www.icloud.com
    network: tcp
    reality-opts:
      public-key: BB1HHv8JT_gNUX57c3FGFvnYprlEPHuCL5csMjunISY
      short-id: 63aa394d267b2f9f
    client-fingerprint: chrome

proxy-groups:
  # 代理中心：控制所有流量切换
  - name: 🚀 节点选择
    type: select
    proxies:
      - "US-Reality-8443-us-vip"
      - DIRECT

  # 自动选择：在多个节点时可启用延迟检测（当前仅一个节点作为备份展示）
  - name: ⚡️ 自动切换
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - "US-Reality-8443-us-vip"

  # 拦截广告
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

rules:
  # 基础分流规则 (覆盖核心边缘情况)
  - DOMAIN-SUFFIX,google.com,🚀 节点选择
  - DOMAIN-SUFFIX,github.com,🚀 节点选择
  - DOMAIN-SUFFIX,youtube.com,🚀 节点选择
  - DOMAIN-SUFFIX,twitter.com,🚀 节点选择
  - DOMAIN-SUFFIX,telegram.org,🚀 节点选择
  
  # 局部区域直连 (中国域名直连)
  - GEOIP,CN,DIRECT
  - MATCH,🚀 节点选择