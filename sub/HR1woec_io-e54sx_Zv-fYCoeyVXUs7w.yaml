# 多线路自动切换模式（节点每30分钟自动更新）

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - "https://dns.google/dns-query#Proxy"
    - "https://cloudflare-dns.com/dns-query#Proxy"
  proxy-server-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 223.5.5.5
  nameserver-policy:
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29
    "+.cn,+.com.cn":
      - 223.5.5.5
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "+.cn"
    - "+.com.cn"
    - "+.anthropic.com"
    - "+.claude.ai"
    - "+.sentry.io" 

proxy-providers:
  nodes:
    type: http
    url: "https://sub.huhiuh.space/sub/HR1woec_io-e54sx_Zv-fYCoeyVXUs7w_nodes.yaml"
    interval: 1800
    path: ./providers/proxy-nodes.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 120

proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - 自动切换
      - DIRECT
    use:
      - nodes

  - name: "自动切换"
    type: fallback
    use:
      - nodes
    url: http://www.gstatic.com/generate_204
    interval: 5
    timeout: 3000
    lazy: true

rules:
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
