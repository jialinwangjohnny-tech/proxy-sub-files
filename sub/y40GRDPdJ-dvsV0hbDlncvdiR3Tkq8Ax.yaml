port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - "https://dns.google/dns-query#Proxy"
    - "https://cloudflare-dns.com/dns-query#Proxy"
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29
    "+.cn,+.com.cn":
      - 223.5.5.5

proxies:
  - name: "CDN-WS-美国"
    type: vless
    server: cdn.huhiuh.space
    port: 443
    uuid: e1a53305-f456-4d4e-ade6-5563417b50ff
    network: ws
    tls: true
    servername: cdn.huhiuh.space
    udp: false
    ws-opts:
      path: /ws
      headers:
        Host: cdn.huhiuh.space

proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - CDN-WS-美国

rules:
  - DOMAIN-KEYWORD,google,Proxy
  - DOMAIN-KEYWORD,gmail,Proxy
  - DOMAIN-KEYWORD,youtube,Proxy
  - DOMAIN-KEYWORD,facebook,Proxy
  - DOMAIN-KEYWORD,instagram,Proxy
  - DOMAIN-KEYWORD,twitter,Proxy
  - DOMAIN-KEYWORD,whatsapp,Proxy
  - DOMAIN-KEYWORD,telegram,Proxy
  - DOMAIN-KEYWORD,netflix,Proxy
  - DOMAIN-KEYWORD,openai,Proxy
  - DOMAIN-KEYWORD,chatgpt,Proxy
  - DOMAIN-KEYWORD,claude,Proxy
  - DOMAIN-KEYWORD,anthropic,Proxy
  - DOMAIN-KEYWORD,github,Proxy
  - DOMAIN-KEYWORD,wikipedia,Proxy
  - DOMAIN-KEYWORD,reddit,Proxy
  - DOMAIN-KEYWORD,discord,Proxy
  - DOMAIN-KEYWORD,spotify,Proxy
  - DOMAIN-KEYWORD,tiktok,Proxy
  - DOMAIN-KEYWORD,amazon,Proxy
  - DOMAIN-SUFFIX,x.com,Proxy
  - DOMAIN-SUFFIX,t.co,Proxy
  - DOMAIN-SUFFIX,fbcdn.net,Proxy
  - DOMAIN-SUFFIX,gstatic.com,Proxy
  - DOMAIN-SUFFIX,googleapis.com,Proxy
  - DOMAIN-SUFFIX,ggpht.com,Proxy
  - DOMAIN-SUFFIX,ytimg.com,Proxy
  - DOMAIN-SUFFIX,cn,DIRECT
  - DOMAIN-SUFFIX,com.cn,DIRECT
  - DOMAIN-KEYWORD,baidu,DIRECT
  - DOMAIN-KEYWORD,alibaba,DIRECT
  - DOMAIN-KEYWORD,aliyun,DIRECT
  - DOMAIN-KEYWORD,taobao,DIRECT
  - DOMAIN-KEYWORD,qq,DIRECT
  - DOMAIN-KEYWORD,tencent,DIRECT
  - DOMAIN-KEYWORD,weixin,DIRECT
  - DOMAIN-KEYWORD,bilibili,DIRECT
  - DOMAIN-KEYWORD,douyin,DIRECT
  - DOMAIN-KEYWORD,bytedance,DIRECT
  - DOMAIN-KEYWORD,zhihu,DIRECT
  - DOMAIN-KEYWORD,sina,DIRECT
  - DOMAIN-KEYWORD,weibo,DIRECT
  - DOMAIN-SUFFIX,deepseek.com,DIRECT
  - DOMAIN-SUFFIX,doubao.com,DIRECT
  - DOMAIN-SUFFIX,kimi.ai,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
